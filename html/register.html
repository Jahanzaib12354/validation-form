<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="stylesheet" href="/css/register.css">
<style>
  .password-wrapper { position: relative; margin-bottom: 15px; }
  .show-hide {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 14px;
    color: #3498db;
  }
</style>
</head>
<body>
<div class="card">
  <h2>Register</h2>
  <form id="registerForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="regEmail" placeholder="Email" required>

    <!-- Password Field -->
    <div class="password-wrapper">
      <input type="password" id="regPassword" placeholder="Password" required>
      <span class="show-hide" data-target="regPassword">Show</span>
    </div>

    <!-- Confirm Password Field -->
    <div class="password-wrapper">
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <span class="show-hide" data-target="confirmPassword">Show</span>
    </div>

    <!-- Department & Roll Number -->
    <input type="text" id="department" placeholder="Department" required>
    <input type="text" id="rollNumber" placeholder="Roll Number" required>

    <button type="submit">Register</button>
  </form>
  <p>Already have an account? <a href="login.html">Login here</a></p>
</div>

<script src="/js/register.js"></script>
<script>
  // Show/Hide toggle for passwords
  const toggleLinks = document.querySelectorAll('.show-hide');
  toggleLinks.forEach(link => {
    link.addEventListener('click', () => {
      const targetId = link.getAttribute('data-target');
      const input = document.getElementById(targetId);
      if(input.type === 'password'){
        input.type = 'text';
        link.textContent = 'Hide';
      } else {
        input.type = 'password';
        link.textContent = 'Show';
      }
    });
  });
</script>
</body>
</html>
