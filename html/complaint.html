<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Complaint Form</title>
<style>
body {
    background: linear-gradient(135deg, #f3e7ff, #ffe9f3);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: #ffffff;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 550px;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #6c3483;
}

label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    margin-top: 6px;
    margin-bottom: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.3s;
}

/* Focus highlight */
input:focus, select:focus, textarea:focus {
    border-color: #8e44ad;
    box-shadow: 0 0 6px rgba(142,68,173,0.3);
    outline: none;
}

textarea { resize: none; height: 90px; }

.radio-group { display: flex; gap: 20px; margin-top: 10px; margin-bottom: 20px; }

button {
    width: 100%;
    padding: 13px;
    background: #8e44ad;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { background: #6c3483; }

/* Disabled fields show not-allowed cursor */
input:disabled, select:disabled, textarea:disabled {
    cursor: not-allowed;
    background-color: #f0f0f0;
}

/* Error styles */
.error {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
    display: block;
}

.error-field { border: 1px solid red !important; }

</style>
</head>
<body>
<div class="card">
    <h1>Customer Complaint Form</h1>
    <form id="complaintForm">
        <label>Full Name</label>
        <input type="text" id="full-name" readonly disabled>

        <label>Email</label>
        <input type="email" id="email" readonly disabled>

        <label>Order Category</label>
        <select id="category1">
            <option value="">Select Order Type</option>
            <option value="electronics">Electronics</option>
            <option value="clothes">Clothes</option>
            <option value="food">Food</option>
        </select>
        <span class="error" id="error-category1"></span>

        <label>Product Type</label>
        <select id="category2" disabled>
            <option value="">Select Product</option>
        </select>
        <span class="error" id="error-category2"></span>

        <label>Issue Type</label>
        <select id="category3" disabled>
            <option value="">Select Issue</option>
        </select>
        <span class="error" id="error-category3"></span>

        <label>Quantity</label>
        <select id="quantity" disabled>
            <option value="">Select Quantity</option>
            <option value="1">1 Item</option>
            <option value="2">2 Items</option>
            <option value="3">3 Items</option>
            <option value="4">4 Items</option>
            <option value="5">5+ Items</option>
        </select>
        <span class="error" id="error-quantity"></span>

        <label>Complaint Description</label>
        <textarea id="complaint-description" ></textarea>
        <span class="error" id="error-description"></span>

        <label>Preferred Solution</label>
        <div class="radio-group">
            <label><input type="radio" name="solution" value="Refund" > Refund</label>
            <label><input type="radio" name="solution" value="Exchange" > Exchange</label>
        </div>
        <span class="error" id="error-solution"></span>

        <button type="submit">Submit Complaint</button>
    </form>
</div>

<script>
// Auto-fill name & email
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("full-name").value = localStorage.getItem("userName") || "";
    document.getElementById("email").value = localStorage.getItem("userEmail") || "";
});

// Category data
const categoryData = {
    electronics: { products: ["Mobile","Laptop","Headphones","Camera"], issues: ["Not Working","Damaged","Battery Issue","Screen Problem"] },
    clothes: { products: ["Shirt","Pant","Jacket","Shoes"], issues: ["Wrong Size","Color Fade","Damaged Cloth","Stitching Issue"] },
    food: { products: ["Pizza","Burger","Cake","Juice"], issues: ["Expired","Bad Taste","Wrong Item","Packaging Issue"] }
};

const category1 = document.getElementById("category1");
const category2 = document.getElementById("category2");
const category3 = document.getElementById("category3");
const quantity = document.getElementById("quantity");
const description = document.getElementById("complaint-description");
const solutionRadios = document.querySelectorAll('input[name="solution"]');

// Enable dependent fields
function clearError(field, errorId){
    field.classList.remove("error-field");
    document.getElementById(errorId).textContent = "";
}

category1.addEventListener("change", function() {
    category2.innerHTML = '<option value="">Select Product</option>';
    category3.innerHTML = '<option value="">Select Issue</option>';
    category2.disabled = !this.value;
    if(this.value){
        categoryData[this.value].products.forEach(p => {
            const opt = document.createElement("option"); opt.textContent = p; opt.value = p;
            category2.appendChild(opt);
        });
        clearError(category1, "error-category1");
    }
});

category2.addEventListener("change", function(){
    category3.innerHTML = '<option value="">Select Issue</option>';
    category3.disabled = !this.value;
    if(this.value){
        categoryData[category1.value].issues.forEach(i => {
            const opt = document.createElement("option"); opt.textContent = i; opt.value = i;
            category3.appendChild(opt);
        });
        clearError(category2, "error-category2");
    }
});

category3.addEventListener("change", function(){
    quantity.disabled = !this.value;
    if(this.value){
        clearError(category3, "error-category3");
    }
});

quantity.addEventListener("change", function(){ description.disabled = !this.value; });

description.addEventListener("input", function(){
    solutionRadios.forEach(r => r.disabled = !this.value.trim());
});

// Submit form with error messages
document.getElementById("complaintForm").addEventListener("submit", function(e){
    e.preventDefault();

    let valid = true;

    // Clear previous errors
    document.querySelectorAll(".error").forEach(el => el.textContent = "");
    document.querySelectorAll("select, textarea").forEach(el => el.classList.remove("error-field"));

    function showError(field, id, msg){
        document.getElementById(id).textContent = msg;
        field.classList.add("error-field");
        valid = false;
    }

    const cat1 = category1.value;
    const cat2 = category2.value;
    const cat3 = category3.value;
    const qty = quantity.value;
    const desc = description.value;
    const solution = document.querySelector('input[name="solution"]:checked')?.value;

    if(!cat1) showError(category1, "error-category1", "Please select Order Category");
    if(!cat2) showError(category2, "error-category2", "Please select Product Type");
    if(!cat3) showError(category3, "error-category3", "Please select Issue Type");
    if(!qty) showError(quantity, "error-quantity", "Please select Quantity");
    if(!desc.trim()) showError(description, "error-description", "Please enter Complaint Description");
    if(!solution) document.getElementById("error-solution").textContent = "Please select Preferred Solution";

    if(!valid) return;

    // Save data for summary page
    localStorage.setItem("complaintName", document.getElementById("full-name").value);
    localStorage.setItem("complaintEmail", document.getElementById("email").value);
    localStorage.setItem("complaintCategory1", cat1);
    localStorage.setItem("complaintCategory2", cat2);
    localStorage.setItem("complaintCategory3", cat3);
    localStorage.setItem("complaintQuantity", qty);
    localStorage.setItem("complaintDescription", desc);
    localStorage.setItem("complaintSolution", solution);

    // Redirect to table page
    window.location.href = "complaint-success.html";
});
</script>
</body>
</html>
